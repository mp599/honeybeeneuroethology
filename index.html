<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Honey Bee Neuroethology Lab</title>
<style>
  :root{
    --red: #D7261E;
    --yellow: #F3C000;
    --blue: #1B4EA0;
    --black: #141414;
    --ink: #1a1a1a;
    --paper: #ffffff;
    --tile: clamp(68px, 9.5vw, 96px);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background-color: var(--paper);
    background-image: url('assets/homepage_bg_hockney_inverted.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: var(--ink);
    font-family: Futura, "Century Gothic", "Avenir Next", Avenir, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    position:absolute;
    top:0; left:0; right:0;
    text-align:center;
    padding: 3rem 1.5rem 0;
  }
  header h1{
    margin:0;
    font-size: clamp(1.3rem, 2.6vw, 1.9rem);
    font-weight:700;
    letter-spacing:0.06em;
    text-transform: uppercase;
  }
  header p{
    margin:.7rem 0 0;
    color:#555;
    font-size:0.85rem;
    letter-spacing:0.03em;
  }
  header .led-by{
    margin:.5rem 0 0;
    color:#999;
    font-size:0.75rem;
    letter-spacing:0.03em;
  }
  header .bars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin: 1.4rem 0 0;
  }
  header .bars span{
    display:block;
    width:34px;
    height:6px;
  }
  header .bars span:nth-child(1){ background: var(--red); }
  header .bars span:nth-child(2){ background: var(--yellow); }
  header .bars span:nth-child(3){ background: var(--blue); }
  header .bars span:nth-child(4){ background: var(--black); }

  .grid{
    width:min(94vw, 980px);
    margin-top: calc(var(--tile) * -0.4);
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: calc(var(--tile) * 0.2);
  }

  .flip-card{
    flex: 0 0 var(--tile);
    aspect-ratio: 1 / 1;
    perspective: 900px;
    box-shadow: 7px 7px 0 rgba(20,20,20,0.88);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .flip-card:hover{
    transform: translate(-3px,-3px);
    box-shadow: 10px 10px 0 rgba(20,20,20,0.88);
  }
  .flip-card a,
  .flip-card .inert{
    display:block;
    width:100%;
    height:100%;
    text-decoration:none;
  }
  .flip-inner{
    position:relative;
    width:100%;
    height:100%;
    transition: transform 0.55s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
  }
  .flip-card:hover .flip-inner,
  .flip-card:focus-within .flip-inner,
  .flip-card.flipped .flip-inner{
    transform: rotateY(180deg);
  }
  .face{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }
  .face-front{
    background: var(--red);
    border: 2px solid var(--black);
  }
  .flip-card.is-yellow .face-front{
    background: var(--yellow);
  }
  .flip-card.is-blue .face-front{
    background: var(--blue);
  }
  .flip-card.is-black .face-front{
    background: var(--black);
  }
  .face-back{
    background: var(--ink);
    border: 2px solid var(--black);
    transform: rotateY(180deg);
    color:#fff;
    gap:.6rem;
    padding: 0.5rem;
  }
  .face-back svg{
    width: 34%;
    height: 34%;
    stroke: #fff;
    fill:none;
    stroke-width:1.6;
  }
  .face-back span{
    font-size: clamp(0.75rem, 1.6vw, 1rem);
    letter-spacing:0.06em;
    text-transform:uppercase;
    font-weight:600;
  }

  .flip-card:hover .face-front{
    filter: brightness(1.04);
  }
</style>
</head>
<body>
<header>
  <h1>Honey Bee Neuroethology Lab</h1>
  <p>Centre des Sciences du Goût et de l'Alimentation, Dijon, France</p>
  <p class="led-by">Led by Marco Paoli, CPJ CNRS</p>
  <div class="bars"><span></span><span></span><span></span><span></span></div>
</header>

<div class="grid">

  <div class="flip-card is-blue">
    <a href="publications.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z"/><path d="M15 3v3h3"/><path d="M9 12h6M9 16h6"/></svg>
          <span>Papers</span>
        </div>
      </div>
    </a>
  </div>

  <div class="flip-card is-yellow">
    <a href="people.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M2 21c0-3.6 2.7-6 6-6s6 2.4 6 6"/><path d="M14 21c0-2.8 1.8-5 4-5.4"/></svg>
          <span>People</span>
        </div>
      </div>
    </a>
  </div>

  <div class="flip-card is-blue">
    <a href="research.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><path d="M9 2v6L4 20a1 1 0 0 0 1 2h14a1 1 0 0 0 1-2L15 8V2"/><path d="M9 2h6"/><path d="M7 15h10"/></svg>
          <span>Research</span>
        </div>
      </div>
    </a>
  </div>

  <div class="flip-card is-black">
    <a href="news.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><path d="M4 5h13v13H4z"/><path d="M17 8h3v9a2 2 0 0 1-2 2H8"/><path d="M7 9h6M7 12h6M7 15h3"/></svg>
          <span>News</span>
        </div>
      </div>
    </a>
  </div>

  <div class="flip-card">
    <a href="center.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><path d="M4 21h16"/><path d="M5 21V9l7-5 7 5v12"/><path d="M9 21v-6h6v6"/><path d="M9 12h.01M12 12h.01M15 12h.01M9 9h.01M12 9h.01M15 9h.01"/></svg>
          <span>The Center</span>
        </div>
      </div>
    </a>
  </div>

  <div class="flip-card is-yellow">
    <a href="gallery.html">
      <div class="flip-inner">
        <div class="face face-front"></div>
        <div class="face face-back">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="1"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="M21 16l-5.5-5.5L5 21"/></svg>
          <span>Gallery</span>
        </div>
      </div>
    </a>
  </div>


</div>

<script>
  (function shuffleGrid(){
    var grid = document.querySelector('.grid');
    var cards = Array.prototype.slice.call(grid.querySelectorAll('.flip-card'));
    var colorClasses = ['is-yellow', 'is-blue', 'is-black'];

    function shuffle(arr){
      for (var i = arr.length - 1; i > 0; i--){
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    // collect current color token per card (null = red, the default)
    var colors = cards.map(function(card){
      for (var i = 0; i < colorClasses.length; i++){
        if (card.classList.contains(colorClasses[i])) return colorClasses[i];
      }
      return null;
    });

    // shuffle which card sits in which grid position
    shuffle(cards).forEach(function(card){ grid.appendChild(card); });

    // independently shuffle which color each position gets
    shuffle(colors).forEach(function(color, i){
      var card = cards[i];
      colorClasses.forEach(function(c){ card.classList.remove(c); });
      if (color) card.classList.add(color);
    });
  })();

  (function tapToFlip(){
    // On touch devices there's no real :hover, so a single tap both flips
    // the card and follows the link at once, giving no chance to just peek.
    // Fix: first tap flips (shows the label), a second tap on the same
    // already-flipped card follows the link. Desktop hover is untouched.
    if (!window.matchMedia('(hover: none)').matches) return;

    document.querySelectorAll('.flip-card > a').forEach(function(link){
      link.addEventListener('click', function(e){
        var card = link.closest('.flip-card');
        if (!card.classList.contains('flipped')){
          e.preventDefault();
          document.querySelectorAll('.flip-card.flipped').forEach(function(c){
            if (c !== card) c.classList.remove('flipped');
          });
          card.classList.add('flipped');
        }
      });
    });
  })();
</script>
</body>
</html>
