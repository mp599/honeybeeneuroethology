<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Contact — Honey Bee Neuroethology Lab</title>
<style>
  :root{
    --red: #D7261E;
    --yellow: #F3C000;
    --blue: #1B4EA0;
    --black: #141414;
    --ink: #1a1a1a;
    --paper: #ffffff;
    --accent: var(--blue);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background-color: var(--paper);
    color:var(--ink);
    font-family: Futura, "Century Gothic", "Avenir Next", Avenir, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .backlink{
    display:block;
    padding: 2.2rem 1.5rem 0;
    font-size:0.8rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#555;
    text-decoration:none;
  }
  .backlink:hover{ color:var(--ink); }
  main{
    max-width:640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }
  main h1{
    margin:0;
    font-size: clamp(1.5rem, 3.4vw, 2.2rem);
    font-weight:700;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }
  .accent-bar{
    width:64px;
    height:8px;
    background: var(--accent);
    border: 2px solid var(--black);
    margin: 1rem 0 2.2rem;
  }
  main p{
    color:#444;
    line-height:1.7;
    font-size:1.02rem;
  }

  .card .name{
    margin:0 0 0.2rem;
    font-size:1.25rem;
    font-weight:700;
  }
  .card .role{
    margin:0 0 1.1rem;
    color:#555;
    font-size:0.95rem;
    line-height:1.5;
  }
  .card address{
    font-style:normal;
    margin:0 0 1.1rem;
    color:#444;
    line-height:1.6;
    font-size:0.95rem;
  }
  .card .email a{
    color: var(--ink);
    font-weight:700;
    text-decoration:underline;
    text-underline-offset:2px;
  }

</style>
</head>
<body>
<a class="backlink" href="index.html">&larr; Home</a>
<main>
  <h1>Contact</h1>
  <div class="accent-bar"></div>

  <div class="card">
    <p class="name">Marco Paoli</p>
    <p class="role">Chaire de Professeur Junior, CNRS<br>Centre des Sciences du Goût et de l'Alimentation</p>
    <address>
      Bureau n° 2.18 &mdash; CSGA<br>
      9E Boulevard Jeanne d'Arc<br>
      21000 Dijon, France
    </address>
    <p class="email"><a href="mailto:marco.paoli@ube.fr">marco.paoli@ube.fr</a></p>
  </div>
</main>
</body>
</html>
