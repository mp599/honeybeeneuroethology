<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Gallery — Honey Bee Neuroethology Lab</title>
<style>
  :root{
    --red: #D7261E;
    --yellow: #F3C000;
    --blue: #1B4EA0;
    --black: #0d0d0d;
    --paper: #f2f2f2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background: var(--black);
    color: var(--paper);
    font-family: Futura, "Century Gothic", "Avenir Next", Avenir, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .backlink{
    display:block;
    padding: 1.6rem 1.5rem 0;
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#888;
    text-decoration:none;
  }
  .backlink:hover{ color:#fff; }

  .viewer{
    max-width: 1000px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 3rem;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stage{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 0.6rem;
  }

  .stage-image{
    position:relative;
    width:100%;
    max-width:820px;
    aspect-ratio: 16 / 10;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    overflow:hidden;
  }
  .stage-image img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }

  .arrow{
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border: 1px solid #444;
    background: transparent;
    color: #ccc;
    font-size: 1.1rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color .2s, color .2s;
  }
  .arrow:hover{ border-color:#fff; color:#fff; }

  .accent-line{
    width: 64px;
    height: 4px;
    background: var(--red);
    margin: 1.4rem 0 0.9rem;
  }

  .meta{
    text-align:center;
  }
  .meta .index{
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:#888;
    margin: 0 0 0.4rem;
  }
  .meta .title{
    font-size: clamp(1rem, 2.6vw, 1.3rem);
    font-weight:700;
    margin: 0 0 0.3rem;
  }
  .meta .desc{
    font-size:0.85rem;
    color:#999;
    line-height:1.5;
    max-width:560px;
    margin: 0 auto;
  }

  .filmstrip{
    display:flex;
    gap: 10px;
    margin-top: 2.2rem;
    overflow-x:auto;
    max-width:100%;
    padding-bottom: 0.5rem;
  }
  .thumb{
    flex: 0 0 auto;
    width: 66px;
    height: 66px;
    cursor:pointer;
    opacity:0.5;
    border-bottom: 3px solid transparent;
    transition: opacity .2s, border-color .2s;
    overflow:hidden;
  }
  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .thumb:hover{ opacity:0.8; }
  .thumb.active{
    opacity:1;
    border-bottom-color: var(--red);
  }

  @media (max-width: 600px){
    .arrow{ display:none; }
    .stage-image{ aspect-ratio: 4/3; }
  }
</style>
</head>
<body>
<a class="backlink" href="index.html">&larr; Home</a>

<div class="viewer">
  <div class="stage">
    <button class="arrow" id="prevBtn" aria-label="Previous">&#8592;</button>
    <div class="stage-image">
      <img id="stageImg" src="" alt="">
    </div>
    <button class="arrow" id="nextBtn" aria-label="Next">&#8594;</button>
  </div>

  <div class="accent-line"></div>
  <div class="meta">
    <p class="index" id="metaIndex"></p>
    <p class="title" id="metaTitle"></p>
    <p class="desc" id="metaDesc"></p>
  </div>

  <div class="filmstrip" id="filmstrip"></div>
</div>

<script>
  var slides = [
    {
      src: "assets/gallery_hockney.jpg",
      title: "Honeybee Brain Photomontage",
      category: "Microscopy",
      desc: "A full honeybee brain, reconstructed Hockney-joiner style from overlapping confocal tiles."
    },
    {
      src: "assets/gallery_antennal_lobe.jpg",
      title: "Antennal Lobe Glomeruli",
      category: "Microscopy",
      desc: "Antennal lobe glomeruli, immunostained and imaged by confocal microscopy."
    },
    {
      src: "assets/gallery_glomerulus.jpg",
      title: "Single Glomerulus",
      category: "Microscopy",
      desc: "A single antennal lobe glomerulus, innervated by projection neuron dendrites."
    },
    {
      src: "assets/gallery_mushroom_body.jpg",
      title: "Mushroom Body Neuropils",
      category: "Microscopy",
      desc: "Mushroom body calyces and associated neuropils in the honeybee brain."
    },
    {
      src: "assets/gallery_optic_lobe.jpg",
      title: "Optic Lobe",
      category: "Microscopy",
      desc: "Optic lobe and central brain neuropils under fluorescence imaging."
    },
    {
      src: "assets/gallery_tracing.jpg",
      title: "Multichannel Neuron Tracing",
      category: "Microscopy",
      desc: "Multichannel tracing of olfactory projection neurons, three separate label channels overlaid."
    }
  ];

  var current = 0;
  var stageImg = document.getElementById('stageImg');
  var metaIndex = document.getElementById('metaIndex');
  var metaTitle = document.getElementById('metaTitle');
  var metaDesc = document.getElementById('metaDesc');
  var filmstrip = document.getElementById('filmstrip');

  slides.forEach(function(slide, i){
    var thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.innerHTML = '<img src="' + slide.src + '" alt="">';
    thumb.addEventListener('click', function(){ show(i); });
    filmstrip.appendChild(thumb);
  });

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function show(i){
    current = (i + slides.length) % slides.length;
    var s = slides[current];
    stageImg.src = s.src;
    stageImg.alt = s.title;
    metaIndex.textContent = pad(current + 1) + ' / ' + pad(slides.length) + '  ·  ' + s.category.toUpperCase();
    metaTitle.textContent = s.title;
    metaDesc.textContent = s.desc;
    document.querySelectorAll('.thumb').forEach(function(t, idx){
      t.classList.toggle('active', idx === current);
    });
  }

  document.getElementById('prevBtn').addEventListener('click', function(){ show(current - 1); });
  document.getElementById('nextBtn').addEventListener('click', function(){ show(current + 1); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });

  show(0);
</script>
</body>
</html>
